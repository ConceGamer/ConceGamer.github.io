        <!-- Carrito de compras -->

                        <tbody id="items-carrito">
                            <!-- Los items del carrito se agregarán aquí -->
                        </tbody>
                        <tfoot>

                                <td colspan="3" class="carrito-text text-end fw-bold">Total:</td>
                                <td colspan="2" class="carrito-text fw-bold" id="total-carrito">$0</td>

                    </button>

            <div id="toast-anadido" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
